global:
  scrape_interval:     15s # By default, scrape targets every 15 seconds.
  evaluation_interval: 15s # Evaluate rules every 15 seconds.

  # Attach these extra labels to all timeseries collected by this Prometheus instance.
  external_labels:
    monitor: 'codelab-monitor'

rule_files:
  - '/vagrant/prometheus.rules.yml'

scrape_configs:
  - job_name: 'prometheus'

    # Override the global default and scrape targets from this job every 5 seconds.
    scrape_interval: 10s

    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'

    scheme: "https"

    basic_auth:
      username: prometheus
      password: 100%GREATpassword-1

    tls_config:
        ca_file: "/etc/node_exporter/ssl/node_exporter.crt"

    scrape_interval: 12s

    static_configs:

      - targets: ['node1.vagrant.local:9100', 'node2.vagrant.local:9100', 'node3.vagrant.local:9100']

        labels:
          group: 'production'

      - targets: ['grafana.vagrant.local:9100', 'prometheus.vagrant.local:9100']
        labels:
          group: 'infra'